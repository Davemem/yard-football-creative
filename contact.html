<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Contact Yard Football Creative through the simple email enquiry page aligned to contact@yardfc.com."
    />
    <title>Contact | Yard Football Creative</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=Public+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-theme="core-field" data-mode="light">
    <div class="page-bg" aria-hidden="true">
      <div class="page-glow page-glow-top"></div>
      <div class="page-glow page-glow-bottom"></div>
    </div>

    <header class="site-header">
      <div class="container header-inner">
        <a class="brand brand-text" href="index.html" aria-label="Yard home">
          <span class="brand-title">Yard</span>
          <span class="brand-subtitle">Football Creative</span>
        </a>

        <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="main-nav">
          Menu
        </button>

        <nav id="main-nav" class="main-nav" aria-label="Main navigation">
          <a href="index.html">Home</a>
          <a href="about.html">About</a>
          <a href="programs.html">Programs</a>
          <a href="events.html">Events</a>
          <a href="contact.html" aria-current="page">Contact</a>
        </nav>

        <div class="header-social" aria-label="Social links">
          <a
            class="social-link"
            href="https://instagram.com/yardfc"
            target="_blank"
            rel="noreferrer"
            aria-label="Instagram"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M7.5 2h9A5.5 5.5 0 0 1 22 7.5v9a5.5 5.5 0 0 1-5.5 5.5h-9A5.5 5.5 0 0 1 2 16.5v-9A5.5 5.5 0 0 1 7.5 2Zm0 1.8A3.7 3.7 0 0 0 3.8 7.5v9a3.7 3.7 0 0 0 3.7 3.7h9a3.7 3.7 0 0 0 3.7-3.7v-9a3.7 3.7 0 0 0-3.7-3.7Zm9.35 1.35a1.15 1.15 0 1 1 0 2.3 1.15 1.15 0 0 1 0-2.3ZM12 6.4A5.6 5.6 0 1 1 6.4 12 5.6 5.6 0 0 1 12 6.4Zm0 1.8A3.8 3.8 0 1 0 15.8 12 3.8 3.8 0 0 0 12 8.2Z"
              />
            </svg>
          </a>

          <span class="social-link social-link-disabled" aria-label="Facebook unavailable">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M13.2 21v-7.8h2.62l.39-3.05H13.2V8.23c0-.88.24-1.48 1.5-1.48h1.6V4.02A19.86 19.86 0 0 0 13.97 4C11.62 4 10 5.43 10 8.07v2H7.38v3.05H10V21Z"
              />
            </svg>
          </span>
        </div>
      </div>
    </header>

    <main class="page-shell">
      <section class="section-shell page-intro-shell reveal">
        <div class="container simple-copy-layout stack-md">
          <h1 class="section-title">Contact</h1>
        </div>
      </section>

      <section class="section-shell reveal">
        <div class="container simple-copy-layout">
          <form class="card form-shell stack-md" action="mailto:contact@yardfc.com" method="post" enctype="text/plain">
            <div class="field-group">
              <label class="field-label" for="name">Name</label>
              <input class="field-input" id="name" name="name" type="text" />
            </div>

            <div class="field-group">
              <label class="field-label" for="email">Email</label>
              <input class="field-input" id="email" name="email" type="email" />
            </div>

            <div class="field-group">
              <label class="field-label" for="message">Message</label>
              <textarea class="field-input field-textarea" id="message" name="message" rows="5"></textarea>
            </div>

            <button class="button button-primary" type="submit">Send</button>
          </form>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">
        <div class="footer-legal">
          <span class="footer-legal-year">&copy; <span data-current-year></span></span>
          <span class="footer-legal-brand">Yard Football Creative</span>
          <span class="footer-legal-abn">ABN 8613 7628 661</span>
        </div>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
